services:
  nginx:
    build: requirements/nginx
    container_name: nginx
    ports:
      - "8080:80"
    networks:
      - app-network
    volumes:
      - "$p:/var/www/html"

  php-fpm:
    build: requirements/php-fpm
    container_name: php-fpm
    ports:
      - "9000:9000"
    networks:
      - app-network
      - mariadb-network
    volumes:
      - "$p:/var/www/html"

  mariadb:
    build: requirements/mariadb
    container_name: mariadb
    ports:
      - "5000:5000"
    networks:
      - mariadb-network

networks:
  app-network:
  mariadb-network:
